name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated list (all | @edoxen/edoxen | @edoxen/vue | @edoxen/astro)'
        required: false
        default: 'all'

# Trusted publishing via npm provenance. Trusted publisher on npmjs.com
# must point at edoxen/edoxen-js + .github/workflows/release.yml, no
# environment. `npm publish --provenance` (NOT pnpm publish) triggers
# the OIDC exchange; the empty NODE_AUTH_TOKEN pattern with pnpm
# suppresses OIDC and fails with ENEEDAUTH / E404.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter='./packages/*' build
      - run: pnpm -r test

      - name: Publish @edoxen/edoxen
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/edoxen')
        working-directory: packages/edoxen
        run: npm publish --provenance --access public
      - name: Publish @edoxen/vue
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/vue')
        working-directory: packages/vue
        run: npm publish --provenance --access public
      - name: Publish @edoxen/astro
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/astro')
        working-directory: packages/astro
        run: npm publish --provenance --access public
