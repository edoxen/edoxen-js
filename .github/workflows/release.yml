name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated list (all | @edoxen/edoxen | @edoxen/vue | @edoxen/astro)'
        required: false
        default: 'all'

# Trusted publishing via npm provenance — `id-token: write` lets GitHub
# issue an OIDC token that npm exchanges for a short-lived publish token.
# The trusted publisher on npmjs.com must point at edoxen/edoxen-js +
# .github/workflows/release.yml, no environment.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # NOTE: `registry-url` deliberately omitted. With it,
          # actions/setup-node writes .npmrc with an empty _authToken
          # when NODE_AUTH_TOKEN is unset, which suppresses the OIDC
          # flow npm needs for trusted publishing.

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter='./packages/*' build
      - run: pnpm -r test

      - name: Publish @edoxen/edoxen
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/edoxen')
        run: pnpm -F '@edoxen/edoxen' publish --access public --no-git-checks --provenance
      - name: Publish @edoxen/vue
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/vue')
        run: pnpm -F '@edoxen/vue' publish --access public --no-git-checks --provenance
      - name: Publish @edoxen/astro
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/astro')
        run: pnpm -F '@edoxen/astro' publish --access public --no-git-checks --provenance
