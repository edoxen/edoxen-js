name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated list (all | @edoxen/edoxen | @edoxen/vue | @edoxen/astro)'
        required: false
        default: 'all'

# Trusted publishing via npm provenance. Combination that actually works
# for this package (mirrors edoxen-js PR #33 + #35 lessons):
#   * id-token: write at workflow level (already)
#   * NO NODE_AUTH_TOKEN env (suppresses OIDC)
#   * actions/setup-node@v5 (not v6 — v6 has OIDC issues)
#   * node-version 24
#   * NO registry-url on setup-node (writes empty _authToken in .npmrc
#     which prevents OIDC fallback)
#   * npm install -g npm@latest before publish
#   * npm publish --provenance (not pnpm publish)
#   * NO --access flag: each package has publishConfig.access = public
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter='./packages/*' build
      - run: pnpm -r test

      - name: Publish @edoxen/edoxen
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/edoxen')
        working-directory: packages/edoxen
        run: npm publish --provenance
      - name: Publish @edoxen/vue
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/vue')
        working-directory: packages/edoxen-vue
        run: npm publish --provenance
      - name: Publish @edoxen/astro
        if: inputs.packages == 'all' || contains(inputs.packages, '@edoxen/astro')
        working-directory: packages/edoxen-astro
        run: npm publish --provenance
